syntax = "proto3";

package hdwallet.tron.proto;

option go_package = "github.com/ranjbar-dev/hd-wallet/txproto/tron";

// TRX transfer (TransferContract).
message TransferContract {
  string owner_address = 1; // base58check (T...)
  string to_address = 2;    // base58check (T...)
  int64 amount = 3;         // in SUN
}

// TRC-20 token transfer, built as a TriggerSmartContract calling the token's
// transfer(address,uint256). Addresses are base58check (T...).
message TransferTRC20Contract {
  string owner_address = 1;    // sender (T...)
  string contract_address = 2; // the TRC-20 token contract (T...)
  string to_address = 3;       // recipient (T...)
  bytes amount = 4;            // big-endian uint256
}

// TRC-10 token transfer (TransferAssetContract). Addresses are base58check (T...).
message TransferAssetContract {
  string asset_name = 1;    // TRC-10 asset ID string, e.g. "1000001"
  string owner_address = 2; // base58check (T...)
  string to_address = 3;    // base58check (T...)
  int64 amount = 4;         // token units
}

// ResourceCode for Stake 2.0 operations.
enum ResourceCode {
  BANDWIDTH = 0;
  ENERGY = 1;
}

// Stake 2.0: freeze TRX to obtain resources (BANDWIDTH or ENERGY).
message FreezeBalanceV2Contract {
  string owner_address = 1;  // base58check (T...)
  int64 frozen_balance = 2;  // SUN (1 TRX = 1,000,000 SUN)
  ResourceCode resource = 3;
}

// Stake 2.0: unfreeze previously frozen TRX.
message UnfreezeBalanceV2Contract {
  string owner_address = 1;   // base58check (T...)
  int64 unfreeze_balance = 2; // SUN
  ResourceCode resource = 3;
}

// Stake 2.0: delegate resources to another account.
message DelegateResourceContract {
  string owner_address = 1;    // base58check (T...)
  ResourceCode resource = 2;
  int64 balance = 3;           // SUN
  string receiver_address = 4; // base58check (T...)
  bool lock = 5;               // true = lock delegation for 3 days
}

// Stake 2.0: revoke delegated resources.
message UndelegateResourceContract {
  string owner_address = 1;    // base58check (T...)
  ResourceCode resource = 2;
  int64 balance = 3;           // SUN
  string receiver_address = 4; // base58check (T...)
}

// Stake 2.0: withdraw unfrozen TRX after the 14-day unbonding period.
message WithdrawExpireUnfreezeContract {
  string owner_address = 1; // base58check (T...)
}

// One vote in a VoteWitnessContract.
message Vote {
  string vote_address = 1; // base58check (T...) of the Super Representative
  int64 vote_count = 2;
}

// Vote for Super Representatives.
message VoteWitnessContract {
  string owner_address = 1; // base58check (T...)
  repeated Vote votes = 2;
}

// Legacy Stake 1.0: freeze TRX to obtain resources (BANDWIDTH or ENERGY).
message FreezeBalanceContract {
  string owner_address    = 1; // base58check (T...)
  int64  frozen_balance   = 2; // SUN (1 TRX = 1,000,000 SUN)
  int64  frozen_duration  = 3; // days
  ResourceCode resource   = 4; // BANDWIDTH or ENERGY
  string receiver_address = 5; // optional delegate target; "" = self
}

// Legacy Stake 1.0: unfreeze previously frozen TRX.
message UnfreezeBalanceContract {
  string owner_address    = 1; // base58check (T...)
  ResourceCode resource   = 2; // BANDWIDTH or ENERGY (default BANDWIDTH)
  string receiver_address = 3; // optional delegate target; "" = self
}

// Unfreeze TRC-10 (legacy asset) balance.
message UnfreezeAssetContract {
  string owner_address = 1; // base58check (T...)
}

// Claim SR / voting rewards (WithdrawBalanceContract).
message WithdrawBalanceContract {
  string owner_address = 1; // base58check (T...)
}

// TRC-10 asset voting (VoteAssetContract).
message VoteAssetContract {
  string owner_address = 1;        // base58check (T...) or hex
  repeated string vote_address = 2; // T... or hex
  bool support = 3;
  int32 count = 4;
}

// Generic smart-contract call (TriggerSmartContract). Supports TRX value,
// arbitrary calldata, and TRC-10 value attachment.
message TriggerSmartContract {
  string owner_address = 1;    // T... or hex
  string contract_address = 2; // T... or hex
  int64 call_value = 3;        // TRX (SUN) sent with the call
  bytes data = 4;              // raw calldata
  int64 call_token_value = 5;  // TRC-10 amount sent with the call
  int64 token_id = 6;          // TRC-10 token id
}

// Block header reference values, used to compute ref_block_bytes / ref_block_hash.
message BlockHeader {
  int64 timestamp = 1;
  bytes tx_trie_root = 2;
  bytes parent_hash = 3;
  int64 number = 4;
  bytes witness_address = 5;
  int32 version = 6;
}

// Transaction payload selector.
message Transaction {
  int64 timestamp = 1;
  int64 expiration = 2;
  BlockHeader block_header = 3;
  int64 fee_limit = 4;

  oneof contract_oneof {
    TransferContract transfer = 5;
    TransferTRC20Contract transfer_trc20 = 6;
    TransferAssetContract transfer_asset = 7;
    FreezeBalanceV2Contract freeze_balance_v2 = 8;
    UnfreezeBalanceV2Contract unfreeze_balance_v2 = 9;
    DelegateResourceContract delegate_resource = 10;
    UndelegateResourceContract undelegate_resource = 11;
    VoteWitnessContract vote_witness = 12;
    WithdrawExpireUnfreezeContract withdraw_expire_unfreeze = 13;
    TriggerSmartContract trigger_smart_contract = 14;
    FreezeBalanceContract freeze_balance = 15;
    UnfreezeBalanceContract unfreeze_balance = 16;
    UnfreezeAssetContract unfreeze_asset = 17;
    WithdrawBalanceContract withdraw_balance = 18;
    VoteAssetContract vote_asset = 19;
  }
}

// SigningInput mirrors a minimal subset of TW.Tron.Proto.SigningInput.
message SigningInput {
  Transaction transaction = 1;
  string raw_json = 2;   // raw transaction JSON from a Tron node / DApp
}

// SigningOutput mirrors a minimal subset of TW.Tron.Proto.SigningOutput.
message SigningOutput {
  bytes id = 1;         // txID = sha256(raw_data)
  bytes signature = 2;  // 65-byte recoverable signature
  bytes raw_data = 3;   // protobuf-serialized raw transaction
  string ref_block_bytes = 4;
  string json = 5;      // convenience JSON
  string error = 6;
}
