syntax = "proto3";

package hdwallet.cosmos.proto;

option go_package = "github.com/ranjbar-dev/hd-wallet/txproto/cosmos";

// A bank MsgSend.
message SendCoinsMessage {
  string from_address = 1;
  string to_address = 2;
  // Single denom/amount pair (the common case).
  string amount = 3;
  string denom = 4;
}

// A staking MsgDelegate / MsgUndelegate (identical wire shape; the type_url
// differs by which Message oneof field carries it).
message MsgDelegate {
  string delegator_address = 1;
  string validator_address = 2;
  string amount = 3;
  string denom = 4;
}

// A distribution MsgWithdrawDelegatorReward.
message MsgWithdrawReward {
  string delegator_address = 1;
  string validator_address = 2;
}

// One message in the transaction body. Multiple messages may be sent in one tx
// via SigningInput.messages.
message Message {
  oneof message_oneof {
    SendCoinsMessage send = 1;
    MsgDelegate delegate = 2;
    MsgDelegate undelegate = 3;
    MsgWithdrawReward withdraw_reward = 4;
  }
}

// Fee for the transaction.
message Fee {
  string amount = 1; // single coin amount
  string denom = 2;  // single coin denom
  uint64 gas = 3;
}

// SigningInput mirrors a minimal subset of TW.Cosmos.Proto.SigningInput for
// DIRECT (protobuf) sign mode with a single bank MsgSend.
message SigningInput {
  uint64 account_number = 1;
  string chain_id = 2;
  uint64 sequence = 3;
  string memo = 4;
  Fee fee = 5;
  // Legacy single bank send (kept for back-compat). Prefer `messages`.
  SendCoinsMessage send = 6;
  // One or more messages (bank send, staking delegate/undelegate, reward
  // withdrawal). When non-empty this takes precedence over `send`.
  repeated Message messages = 7;
}

// SigningOutput mirrors a minimal subset of TW.Cosmos.Proto.SigningOutput.
message SigningOutput {
  // Protobuf-serialized TxRaw bytes.
  bytes encoded = 1;
  // base64 of `encoded`, as TWC reports it in `serialized` tx_bytes.
  string tx_bytes = 2;
  // 64-byte signature (R||S).
  bytes signature = 3;
  // Error message, empty on success.
  string error = 4;
  // Transaction id/hash: upper-case hex of sha256(encoded TxRaw bytes), the
  // tx hash Cosmos explorers display and broadcast tracks.
  string tx_id = 5;
}
