syntax = "proto3";

package hdwallet.bitcoin.proto;

option go_package = "github.com/ranjbar-dev/hd-wallet/txproto/bitcoin";

// A single unspent transaction output available to spend.
message UnspentTransaction {
  // Previous output point.
  bytes out_point_hash = 1; // 32-byte txid, internal (little-endian) byte order
  uint32 out_point_index = 2; // vout
  uint32 out_point_sequence = 3; // nSequence (default 0xffffffff)

  // Value in satoshis.
  int64 amount = 4;

  // scriptPubKey of the UTXO (P2WPKH: OP_0 <20-byte-hash>).
  bytes script = 5;
}

// SigningInput mirrors a minimal subset of TW.Bitcoin.Proto.SigningInput,
// restricted to P2WPKH (BIP-143) spending.
message SigningInput {
  // SIGHASH type (default 0x01 = SIGHASH_ALL).
  uint32 hash_type = 1;

  // Total amount to send to to_address, in satoshis.
  int64 amount = 2;

  // Fee per byte, in satoshis (used by the simple coin-selection plan).
  int64 byte_fee = 3;

  // Recipient address (bech32 P2WPKH).
  string to_address = 4;

  // Change address (bech32 P2WPKH); receives the remainder.
  string change_address = 5;

  // Available UTXOs.
  repeated UnspentTransaction utxo = 6;

  // Locktime (default 0).
  uint32 lock_time = 7;

  // If set, send everything (minus fee) to to_address; no change output.
  bool use_max_amount = 8;
}

// One selected/used output point in the final transaction.
message UsedUTXO {
  bytes out_point_hash = 1;
  uint32 out_point_index = 2;
  int64 amount = 3;
}

// SigningOutput mirrors a minimal subset of TW.Bitcoin.Proto.SigningOutput.
message SigningOutput {
  // Fully signed raw transaction (wire format with witnesses).
  bytes encoded = 1;

  // Transaction id (double-SHA256 of the non-witness serialization), display
  // (big-endian) byte order.
  bytes transaction_id = 2;

  // Hex of `encoded`.
  string encoded_hex = 3;

  // The fee paid, in satoshis.
  int64 fee = 4;

  // The UTXOs that were selected and spent.
  repeated UsedUTXO used_utxo = 5;

  // Error message, empty on success.
  string error = 6;
}
