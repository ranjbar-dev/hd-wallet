syntax = "proto3";

package hdwallet.ethereum.proto;

option go_package = "github.com/ranjbar-dev/hd-wallet/txproto/ethereum";

// Transaction type / payload. Mirrors a minimal subset of Trust Wallet Core's
// TW.Ethereum.Proto.Transaction.
message Transaction {
  // Native coin transfer.
  message Transfer {
    // Amount to send, big-endian uint256 bytes.
    bytes amount = 1;
    // Optional contract-call payload appended after the value transfer.
    bytes data = 2;
  }

  // ERC-20 token transfer.
  message ERC20Transfer {
    // Recipient address ("0x"-prefixed hex).
    string to = 1;
    // Token amount, big-endian uint256 bytes.
    bytes amount = 2;
  }

  // Arbitrary contract call, or contract creation (deploy). For a call, set
  // SigningInput.to_address to the contract address and put the call's ABI
  // calldata in `data`. For creation, leave SigningInput.to_address empty and
  // put the init code in `data`. `amount` is the native value to send (may be
  // empty for zero).
  message ContractGeneric {
    // Native value to send, big-endian uint256 bytes (empty == 0).
    bytes amount = 1;
    // Calldata (contract call) or init code (contract creation).
    bytes data = 2;
  }

  oneof transaction_oneof {
    Transfer transfer = 1;
    ERC20Transfer erc20_transfer = 2;
    ContractGeneric contract_generic = 3;
  }
}

// Access is one EIP-2930 access-list entry: an address plus the storage slots
// the transaction intends to access under it.
message Access {
  // Address being accessed ("0x"-prefixed hex, 20 bytes).
  string address = 1;
  // Storage slots accessed under address; each is a 32-byte big-endian key.
  repeated bytes stored_keys = 2;
}

// EthAuthorization is one EIP-7702 authorization-list entry. The EOA that
// wants to delegate its code to `address` signs [chain_id, address, nonce]
// off-band (using keccak256(0x05 || rlp([chain_id, address, nonce]))), and
// the resulting (y_parity, r, s) plus the delegation target are carried here.
// All fields are required; the tx signer does NOT sign the authorization tuple.
message EthAuthorization {
  // Chain id for which this authorization is valid, big-endian bytes.
  bytes chain_id = 1;
  // Delegation target ("0x"-prefixed hex, 20 bytes).
  string address = 2;
  // Authorizing EOA nonce at the time of authorization.
  uint64 nonce = 3;
  // y_parity of the authorization signature (0 or 1).
  uint32 y_parity = 4;
  // r component of the authorization signature, 32 bytes big-endian.
  bytes r = 5;
  // s component of the authorization signature, 32 bytes big-endian.
  bytes s = 6;
}

// SigningInput mirrors a minimal subset of TW.Ethereum.Proto.SigningInput.
message SigningInput {
  // Chain id, big-endian bytes (EIP-155).
  bytes chain_id = 1;

  // Sender nonce, big-endian bytes.
  bytes nonce = 2;

  // Transaction type: 0 = legacy, 1 = EIP-2930 (access list), 2 = EIP-1559,
  // 3 = EIP-4844 (blob), 4 = EIP-7702 (set-code).
  uint32 tx_mode = 3;

  // Legacy gas price, big-endian bytes (tx_mode == 0).
  bytes gas_price = 4;

  // Gas limit, big-endian bytes.
  bytes gas_limit = 5;

  // EIP-1559 max inclusion (priority) fee per gas, big-endian bytes.
  bytes max_inclusion_fee_per_gas = 6;

  // EIP-1559 max fee per gas, big-endian bytes.
  bytes max_fee_per_gas = 7;

  // Destination: recipient address for native transfer, or token contract
  // address for ERC-20 transfer ("0x"-prefixed hex).
  string to_address = 8;

  // What to do.
  Transaction transaction = 9;

  // Optional EIP-2930 access list. Carried in the signed bytes for tx_mode 1
  // (EIP-2930) and tx_mode 2 (EIP-1559); ignored for legacy (tx_mode 0). An
  // empty list reproduces the no-access-list encoding exactly.
  repeated Access access_list = 10;

  // EIP-4844: max fee per blob gas (a.k.a. maxFeePerBlobGas), big-endian
  // bytes. Required for tx_mode 3 (EIP-4844); ignored otherwise.
  bytes max_fee_per_blob_gas = 11;

  // EIP-4844: versioned blob hashes. Each entry must be exactly 32 bytes;
  // the first byte is the version (0x01 for KZG commitments per EIP-4844).
  // At least one hash is required for tx_mode 3; ignored otherwise.
  // The network-wrapper (blobs, commitments, proofs) is out of scope — only
  // the tx envelope is signed here.
  repeated bytes blob_versioned_hashes = 12;

  // EIP-7702: authorization list. Required for tx_mode 4 (EIP-7702); ignored
  // otherwise. Each entry is a pre-signed delegation authorization from an EOA
  // that wishes to set its code to point at a contract address.
  repeated EthAuthorization authorization_list = 13;
}

// SigningOutput mirrors a minimal subset of TW.Ethereum.Proto.SigningOutput.
message SigningOutput {
  // RLP-encoded signed transaction, ready to broadcast.
  bytes encoded = 1;

  // Signature scalars and recovery value.
  bytes r = 2;
  bytes s = 3;
  bytes v = 4;

  // Hex of `encoded` (no "0x" prefix), for convenience.
  string encoded_hex = 5;

  // Error message, empty on success.
  string error = 6;

  // Transaction id/hash: "0x" + lower-case hex of keccak256(encoded). This is
  // the canonical Ethereum tx hash explorers display and broadcast tracks.
  string tx_id = 7;
}
