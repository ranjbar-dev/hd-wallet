version: "2"

# golangci-lint v2 configuration. Default linters (errcheck, govet, ineffassign,
# staticcheck, unused) are enabled automatically; gosimple is merged into
# staticcheck in v2, and formatters (gofmt/goimports) live in their own section.
linters:
  enable:
    - misspell
    - revive
    - unconvert
    - prealloc
  exclusions:
    rules:
      # crypto.go intentionally imports golang.org/x/crypto/ripemd160 (deprecated)
      # because RIPEMD-160 is consensus-mandated for Bitcoin/Cosmos address hashing.
      - path: crypto\.go
        linters:
          - staticcheck
        text: "SA1019"
      # prealloc in test files generates noise; skip it there.
      - path: _test\.go
        linters:
          - prealloc

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/ranjbar-dev/hd-wallet
